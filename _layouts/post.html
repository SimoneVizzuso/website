---
layout: default
---

<article class="container blog-post">
  <span class="date">{{ page.date | date: "%d/%m/%Y" }}</span>
  <h1>{{ page.title }}</h1>
  
  <div class="post-content">
    {{ content }}
  </div>

  <p style="margin-top: 2rem;">
    <a href="/blog/" class="btn">&larr; Torna al blog</a>
  </p>
</article>
